<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение на Никах</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* ИСПРАВЛЕНО: Теперь имя файла точь-в-точь как у вас */
        @font-face {
            font-family: 'Bickham Script Pro';
            src: url('BickhamScriptPro.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: #333333; /* Темный фон для областей вне телефона (по бокам) */
}
        /* Мобильный контейнер */
        .mobile-container {
            position: relative;
            width: 100%;
            max-width: 450px; 
            height: 100vh;    
            margin: 0 auto;   
            
            /* Фон-гифка */
            background-image: url('background.gif'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; 
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        }

        /* Полупрозрачная вуаль поверх гифки */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 235, 230, 0.25); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; 
            padding: 20px;
            width: 90%;
        }
/* --- АБСОЛЮТНО НЕЗАВИСИМЫЙ ПУЛЬТ ДЛЯ ВСЕХ ТЕКСТОВ --- */

        /* 1. НАДПИСЬ "Nikkah Day" */
        .subtitle {
            font-family: 'Bickham Script Pro', cursive;
            font-size: 2rem;
            color: #5c4a3c;
            position: relative; /* Режим независимого движения */
            
            /* МЕНЯЙТЕ ТУТ: */
            top: 20px; /* Положительное число (например, 15px) опустит только эту надпись вниз. Отрицательное (например, -15px) — поднимет вверх */
            
            margin-bottom: 5px; /* Минимальный базовый отступ */
        }

        /* 2. ДАТА "30.10.26" */
        .date {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #5c4a3c;
            font-weight: 300;
            position: relative; /* Режим независимого движения */
            
            /* МЕНЯЙТЕ ТУТ: */
            top: -20px; /* Поставьте -15px или -20px, чтобы поднять дату прямо к Nikkah Day, не сдвигая имена ниже! */
            
            margin-bottom: 25px; /* Базовый отступ до имен */
        }

        /* Общая оболочка для имен (выстраивает их по центру) */
        .wedding-names {
            font-family: 'Bickham Script Pro', cursive;
            color: #4a3b2c;
            font-weight: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. ПЕРВОЕ ИМЯ (Aria) */
        .first-name {
            font-size: 4.2rem;
            position: relative;
            
            /* МЕНЯЙТЕ ТУТ: */
            top: 60px; /* Двигает только первое имя вверх или вниз */
        }

        /* 4. ЗНАЧОК АМПЕРСАНДА (&) */
        .ampersand {
            font-size: 4.2rem;
            color: #7d6652;
            position: relative;
            
            /* МЕНЯЙТЕ ТУТ: */
            top: -40px; /* Двигает только значок & */
        }

        /* 5. ВТОРОЕ ИМЯ (Khalil) */
        .last-name {
            font-size: 4.2rem;
            position: relative;
            
            /* МЕНЯЙТЕ ТУТ: */
            top: -115px; /* Двигает только второе имя */
            
            margin-bottom: 40px;
        }
        .scroll-down {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .scroll-down span {
            font-family: 'Bickham Script Pro', cursive;
            font-size: 2.3rem;
            color: #5c4a3c;
            margin-bottom: -20px;
        }

        .scroll-down .arrow {
            width: 12px;
            height: 12px;
            border-right: 2px solid #5c4a3c;
            border-bottom: 2px solid #5c4a3c;
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); }
            40% { transform: translateY(-6px) rotate(45deg); }
            60% { transform: translateY(-3px) rotate(45deg); }
        }
/* --- НАСТРОЙКИ СЛЕДУЮЩЕГО БЛОКА С ТАЙМЕРОМ --- */

   .countdown-block {
    position: relative;
    width: 100%;
    max-width: 450px;
    min-height: 100vh;
    margin: 0 auto;
    background-image: linear-gradient(rgba(245, 235, 230, 0.4), rgba(245, 235, 230, 0.4)), url('fon2.jpg'); 
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    
    /* --- ИЗМЕНЯЕМ ТУТ --- */
    /* Первое число (отступ сверху) ставим 0px, чтобы бумага могла прижаться к краю */
    padding: 0px 20px 60px 20px; 
    
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
} /* <- это закрылась какая-то предыдущая настройка */
    
/* --- ТО ЖЕ САМОЕ ПОКРЫТИЕ ДЛЯ БЛОКА С ТАЙМЕРОМ --- */
.countdown-block { /* ТУТ ОБЯЗАТЕЛЬНО ДОЛЖНО БЫТЬ ИМЯ БЛОКА И ОТКРЫВАЮЩАЯ СКОБКА */
    background-image: linear-gradient(rgba(177, 159, 119, 0.4), rgba(245, 235, 230, 0.4)), url('fon2.jpg');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    
    padding: 100px 20px 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
} /* И В САМОМ КОНЦЕ ОБЯЗАТЕЛЬНО ЗАКРЫВАЮЩАЯ СКОБКА */

        /* Эффект рваного края бумаги */
        .torn-edge {
            position: absolute;
            top: -45px; /* Накладывается на предыдущий блок с гифкой */
            left: 0;
            width: 100%;
            height: 50px;
            overflow: hidden;
            line-height: 0;
        }

        .torn-edge svg {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Текст цитаты */
        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #4a3b2c;
            max-width: 320px;
            margin-bottom: 80px;
            font-weight: 300;
        }

        /* Заголовок "The Celebration Begins In" */
      .countdown-title {
    font-family: 'Bickham Script Pro', cursive;
    font-size: 3rem;
    color: #4a3b2c;
    font-weight: 400;
    margin-bottom: -20px;

    /* --- ДВИГАЕМ ЗАГОЛОВОК --- */
    position: relative;
    top: 0px; /* Меняйте здесь, чтобы подвинуть надпись независимо от цифр */
}

        /* Контейнер для цифр */
        .timer-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 360px;
    position: relative;
    top: 0px;

    /* --- МАГИЯ ВЫРАВНИВАНИЯ ПО ЦЕНТРУ --- */
    margin: 0 auto; /* Автоматически сделает одинаковые отступы слева и справа, центрируя таймер */
}

        .timer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
        }

        /* Сами цифры */
        .timer-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; /* Крупные благородные цифры */
            color: #4a3b2c; /* Золотисто-коричневый оттенок */
            font-weight: 300;
            line-height: 1;
            margin-bottom: 10px;
        }

        /* Подписи под цифрами (Days, Hours...) */
        .timer-label {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            color: #a38a75;
            text-transform: capitalize;
            font-weight: 300;
        }

        /* Двоеточия между цифрами */
        .timer-separator {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #a38a75;
            line-height: 1;
            margin: 0 5px;
            font-weight: 300;
        }
/* --- ПОДЛОЖКА-БУМАГА НА ВСЮ ШИРИНУ С РУЧНОЙ ВЫСОТОЙ --- */
.quote-paper-card {
    background-image: url('dly2bloka2.png'); 
    background-size: 100% 100%; 
    background-repeat: no-repeat;
    background-position: center;
    width: 100%;
    max-width: 450px; 
    margin: 0 auto;
    padding-top: 40px;    
    padding-bottom: 200px; 
    padding-left: 20px;
    padding-right: 20px;
    box-sizing: border-box; 
    position: relative;
    top: -100px;
}

/* Стили самого текста внутри бумаги */
.quote-paper-card .quote-text {
    width: 100%; 
    text-align: center; 
    display: flex;
    justify-content: center;

    margin: 0 auto;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;

    top: 100px; 
}
/* Родителю (контейнеру) обязательно задаем relative, чтобы цветы позиционировались относительно него */
.countdown-block {
    position: relative;
    /* ... остальные ваши стили (.countdown-block) ... */
}

/* --- СТИЛИ ДЛЯ ЦВЕТОВ НА СТЫКЕ --- */
.flowers-divider {
    position: absolute;
    
    /* 1. Центрируем картинку по горизонтали */
    left: 50%;
    transform: translateX(-50%);
    
    /* 2. Ширина: задайте нужный размер, например, на 90% или 100% ширины экрана */
    width: 100%; 
    max-width: 450px; /* Чтобы не растягивалось больше мобильного экрана */
    
    /* 3. Высота подстраивается автоматически */
    height: auto; 
    
    /* 4. ПОЗИЦИЯ ПО ВЕРТИКАЛИ (Управление высотой) */
    /* top: 0 поместит цветы в самый верх блока .countdown-block (на стык с предыдущим экраном) */
    top: -175px; 
    
    /* РЕГУЛИРОВКА: Если нужно приподнять цветы чуть выше на предыдущий блок, 
       используйте отрицательное значение, например: top: -40px; */

    /* 5. Слои: поднимаем картинку выше фона и выше бумаги */
    z-index: 10; 
    
    /* Отключаем возможность случайно перетащить картинку пальцем на смартфонах */
    pointer-events: none; 
}
</style>

 <div class="countdown-block">

<script>
        // Укажите дату вашего события (Год, Месяц - 1, День, Часы, Минуты)
        // Внимание: в JS месяцы считаются с 0 (январь - 0, октябрь - 9)
        const targetDate = new Date(2026, 7, 27, 10, 0, 0).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.querySelector(".timer-container").innerHTML = "<h3>Событие уже началось!</h3>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Красивое форматирование: добавляем нолик перед цифрой, если она меньше 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // Запускаем обновление каждую секунду
        setInterval(updateCountdown, 1000);
        updateCountdown(); // И один раз при загрузке
    </script>
