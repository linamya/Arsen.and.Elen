<script>
window.addEventListener('scroll', function() {
    const block = document.querySelector('.scrolling-layer-block');
    const movingImg = document.getElementById('parallax-img');
    
    if (!block || !movingImg) return;

    const blockRect = block.getBoundingClientRect();
    const windowHeight = window.innerHeight;

    // Проверяем, зашел ли блок на экран
    if (blockRect.top < windowHeight && blockRect.bottom > 0) {
        // Вычисляем, насколько пикселей пользователь прокрутил страницу внутри этого блока
        const scrolled = windowHeight - blockRect.top;
        
        /* ========================================================
           НАСТРОЙКА НАШИХ ШАГОВ (в пикселях):
           Вы можете менять эти цифры, подстраивая под свой дизайн.
           ======================================================== */
        const step1 = 40;  // Первый шажок (слегка сдвинулся)
        const step2 = 220; // Второй шажок (опустился ниже)
        const step3 = 440; // Третий шаг — ТОЧКА ОСТАНОВКИ. Дальше картинка не пойдет.
        
        // Плавная скорость движения к этим шагам
        let moveDown = scrolled * 0.3; 

        // Логика фиксации на третьем шаге:
        if (moveDown > step3) {
            moveDown = step3; // Если скроллим дальше, картинка жестко застывает на шаге 3
        }

        // Применяем движение к картинке (и держим её на самом верхнем слое)
        movingImg.style.transform = `translate(-50%, ${moveDown}px)`;
        movingImg.style.zIndex = "9999";
    }
});
</script>

<script>
        // Укажите дату вашего события (Год, Месяц - 1, День, Часы, Минуты)
        // Внимание: в JS месяцы считаются с 0 (январь - 0, октябрь - 9)
        const targetDate = new Date(2026, 7, 27, 10, 0, 0).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.querySelector(".timer-container").innerHTML = "<h3>Событие уже началось!</h3>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Красивое форматирование: добавляем нолик перед цифрой, если она меньше 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // Запускаем обновление каждую секунду
        setInterval(updateCountdown, 1000);
        updateCountdown(); // И один раз при загрузке
    </script>
</html>
