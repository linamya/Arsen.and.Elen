<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aria &amp; Khalil — Приглашение</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1: #efe6ea;
    --bg-2: #ddc9d2;
    --bg-3: #cdb2bf;
    --wax: #c08a6e;
    --wax-dark: #9c6650;
    --wax-light: #e0ac8c;
    --ink: #4a2e2e;
    --ink-soft: #7c5a52;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; overscroll-behavior:none; }

  body{
    font-family:'Cormorant Garamond', serif;
    color:var(--ink);
    background: #e7d6dd;
    height:100vh;
    width:100vw;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- ENVELOPE — fills the entire viewport, like the reference ---------- */
  .envelope-wrap{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    cursor:pointer;
  }

  .envelope-wrap.opened{ cursor:default; }

  /* base card background (page content would live behind, here it's just the bg) */
  .envelope-base{
    position:absolute;
    inset:0;
    overflow:hidden;
    transition: opacity 0.3s ease 0.3s;
  }
  .envelope-wrap.opened .envelope-base{
    opacity:0;
  }
  .envelope-base::before{
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(155deg, #f2e9ec 0%, #e7d6dd 55%, #ddc6d1 100%);
  }
  .envelope-base::after{ /* paper speckle */
    content:'';
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(74,46,46,0.05) 1px, transparent 1.5px),
      radial-gradient(rgba(74,46,46,0.04) 1px, transparent 1.5px);
    background-size: 9px 9px, 13px 13px;
    background-position: 0 0, 4px 6px;
    opacity:0.6;
  }

  /* diagonal fold seams of the envelope, visible like in the reference */
  .fold-seam{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:3;
  }
  .fold-seam svg{ width:100%; height:100%; display:block; }
  .envelope-wrap.opened .fold-seam{ opacity:0; transition: opacity 0.25s ease; }

  /* the 4 triangular flaps that fly apart on open, each clipped from the same envelope graphic */
  .flap{
    position:absolute;
    inset:0;
    background: linear-gradient(155deg, #f2e9ec 0%, #e7d6dd 55%, #ddc6d1 100%);
    transition: transform 1.1s cubic-bezier(.5,0,.2,1) 0.15s;
    will-change: transform;
  }
  .flap::after{
    content:'';
    position:absolute; inset:0;
    background-image: radial-gradient(rgba(74,46,46,0.05) 1px, transparent 1.5px);
    background-size:9px 9px;
    opacity:0.55;
  }
  .flap.top{    clip-path: polygon(0% 0%, 100% 0%, 50% 50%); }
  .flap.bottom{ clip-path: polygon(0% 100%, 100% 100%, 50% 50%); }
  .flap.left{   clip-path: polygon(0% 0%, 0% 100%, 50% 50%); }
  .flap.right{  clip-path: polygon(100% 0%, 100% 100%, 50% 50%); }

  .envelope-wrap.opened .flap.top{    transform: translateY(-115%); }
  .envelope-wrap.opened .flap.bottom{ transform: translateY(115%); }
  .envelope-wrap.opened .flap.left{   transform: translateX(-115%); }
  .envelope-wrap.opened .flap.right{  transform: translateX(115%); }

  /* ---------- WAX SEAL ---------- */
  .seal{
    position:absolute;
    left:50%; top:50%;
    width:84px; height:84px;
    margin-left:-42px; margin-top:-42px;
    border-radius:50%;
    z-index:6;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 32% 28%, var(--wax-light) 0%, var(--wax) 45%, var(--wax-dark) 100%);
    box-shadow:
      0 6px 14px rgba(80,40,30,0.45),
      inset 0 2px 3px rgba(255,224,200,0.5),
      inset 0 -6px 10px rgba(60,25,18,0.35);
    transition: transform 0.6s ease, opacity 0.6s ease;
    animation: seal-breathe 2.4s ease-in-out infinite;
    cursor:pointer;
  }
  .seal::before{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:50%;
    background:
      radial-gradient(circle at 70% 75%, transparent 60%, rgba(120,60,40,0.25) 62%, transparent 66%),
      radial-gradient(circle at 25% 80%, transparent 70%, rgba(120,60,40,0.18) 72%, transparent 76%);
  }
  .seal-mono{
    font-family:'Petit Formal Script', cursive;
    font-size:26px;
    color:#fff6ee;
    text-shadow: 0 1px 1px rgba(70,30,20,0.5);
    position:relative;
    z-index:1;
  }
  .seal-ring{
    position:absolute;
    inset:8px;
    border-radius:50%;
    border:1px solid rgba(255,240,225,0.45);
  }

  @keyframes seal-breathe{
    0%, 100%{ transform: scale(1); }
    50%{ transform: scale(1.045); }
  }

  /* step 1: seal melts away completely before envelope opens */
  .seal.melt{
    animation:none;
    transform: scale(0.25);
    opacity:0;
  }
  /* step 2 (after seal gone): envelope flaps fly apart -> handled by .opened on wrapper */
  .envelope-wrap.opened .seal{
    pointer-events:none;
  }

  /* hint label */
  .hint{
    position:absolute;
    left:0; right:0;
    bottom:-42px;
    text-align:center;
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:0.85;
    transition:opacity 0.4s ease;
  }
  .envelope-wrap.opened .hint{ opacity:0; }

  /* ---------- SOUND TOGGLE ---------- */
  .sound-toggle{
    position:fixed;
    right:18px;
    bottom:18px;
    width:42px; height:42px;
    border-radius:50%;
    border:1px solid rgba(74,46,46,0.18);
    background: rgba(255,250,248,0.55);
    backdrop-filter: blur(6px);
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:20;
    opacity:0;
    pointer-events:none;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .sound-toggle.visible{
    opacity:1;
    pointer-events:auto;
    transform: translateY(0);
  }
  .sound-toggle:active{ transform: scale(0.92); }

  @media (prefers-reduced-motion: reduce){
    .seal, .flap, .hint, .sound-toggle{ transition-duration:0.2s !important; animation:none !important; }
  }
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="envelope-wrap" id="envelope" tabindex="0" role="button" aria-label="Открыть приглашение">

      <div class="envelope-base"></div>

      <div class="fold-seam">
        <svg viewBox="0 0 300 205" preserveAspectRatio="none">
          <line x1="0" y1="0" x2="150" y2="102.5" stroke="rgba(120,70,70,0.22)" stroke-width="1"/>
          <line x1="300" y1="0" x2="150" y2="102.5" stroke="rgba(120,70,70,0.22)" stroke-width="1"/>
          <line x1="0" y1="205" x2="150" y2="102.5" stroke="rgba(120,70,70,0.16)" stroke-width="1"/>
          <line x1="300" y1="205" x2="150" y2="102.5" stroke="rgba(120,70,70,0.16)" stroke-width="1"/>
        </svg>
      </div>

      <div class="flap top"></div>
      <div class="flap bottom"></div>
      <div class="flap left"></div>
      <div class="flap right"></div>

      <div class="seal" id="seal">
        <div class="seal-mono">A&nbsp;K</div>
        <div class="seal-ring"></div>
      </div>

      <div class="hint"><span id="hintText">Нажмите, чтобы открыть</span></div>
    </div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

  <button class="sound-toggle" id="soundToggle" aria-label="Включить/выключить музыку" type="button">
    <svg id="soundIconOn" viewBox="0 0 24 24" width="18" height="18" style="display:none">
      <path fill="currentColor" d="M3 10v4h4l5 5V5L7 10H3z"/>
      <path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03z"/>
      <path fill="currentColor" d="M14 4.13v2.06c2.89.86 5 3.54 5 6.81s-2.11 5.95-5 6.81v2.06c4.01-.91 7-4.49 7-8.87s-2.99-7.96-7-8.87z"/>
    </svg>
    <svg id="soundIconOff" viewBox="0 0 24 24" width="18" height="18">
      <path fill="currentColor" d="M3 10v4h4l5 5V5L7 10H3z"/>
      <path fill="currentColor" d="M19 12l2.5-2.5-1.4-1.4L17.6 10.6 15.1 8.1l-1.4 1.4L16.2 12l-2.5 2.5 1.4 1.4 2.5-2.5 2.5 2.5 1.4-1.4L19 12z"/>
    </svg>
  </button>

<script>
  // ====== НАСТРОЙКИ — поменяйте под себя ======
  var REDIRECT_URL = "page2.html"; // ссылка на 2-ю (основную) страницу сайта
  var SEAL_MELT_DURATION   = 650;   // мс — время полного исчезновения печати
  var PAUSE_AFTER_MELT     = 200;   // мс — небольшая пауза перед раскрытием конверта
  var ENVELOPE_OPEN_DURATION = 1100; // мс — время разъезда клапанов конверта (должно совпадать с transition в CSS)
  var PAUSE_BEFORE_REDIRECT  = 450;  // мс — пауза после полного открытия перед переходом
  var MUSIC_VOLUME = 0.6;            // громкость музыки (0.0 – 1.0)
  // ============================================

  var envelope = document.getElementById('envelope');
  var seal = document.getElementById('seal');
  var hintText = document.getElementById('hintText');
  var music = document.getElementById('bgMusic');
  var soundToggle = document.getElementById('soundToggle');
  var soundIconOn = document.getElementById('soundIconOn');
  var soundIconOff = document.getElementById('soundIconOff');
  var started = false;

  music.volume = MUSIC_VOLUME;

  function showMuteIcon(){
    soundIconOn.style.display = 'none';
    soundIconOff.style.display = 'block';
  }
  function showPlayIcon(){
    soundIconOn.style.display = 'block';
    soundIconOff.style.display = 'none';
  }

  function startMusic(){
    var p = music.play();
    if (p && p.catch){
      p.then(function(){
        showMuteIcon();
        soundToggle.classList.add('visible');
      }).catch(function(){
        // автоплей заблокирован браузером — показываем кнопку, чтобы включить вручную
        showPlayIcon();
        soundToggle.classList.add('visible');
      });
    } else {
      showMuteIcon();
      soundToggle.classList.add('visible');
    }
  }

  soundToggle.addEventListener('click', function(){
    if (music.paused){
      music.play();
      showMuteIcon();
    } else {
      music.pause();
      showPlayIcon();
    }
  });

  function goToMainSite(){
    var url = REDIRECT_URL;
    if (!music.paused){
      url += (url.indexOf('?') > -1 ? '&' : '?') + 'music=1';
    }
    window.location.href = url;
  }

  function openSequence(){
    if (started) return;
    started = true;
    hintText.textContent = '';

    // включаем музыку одновременно с началом анимации (по клику — автоплей разрешён)
    startMusic();

    // 1. печать постепенно исчезает полностью
    seal.classList.add('melt');

    // 2. после исчезновения печати — конверт раздвигается
    setTimeout(function(){
      envelope.classList.add('opened');
    }, SEAL_MELT_DURATION + PAUSE_AFTER_MELT);

    // 3. переход на основную страницу после завершения анимации раскрытия
    setTimeout(goToMainSite, SEAL_MELT_DURATION + PAUSE_AFTER_MELT + ENVELOPE_OPEN_DURATION + PAUSE_BEFORE_REDIRECT);
  }

  envelope.addEventListener('click', openSequence);
  envelope.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openSequence();
    }
  });
</script>

</body>
</html>
